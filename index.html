<head>
    <title>The Pet Project</title>
    <link rel="stylesheet" href="https://377rzd.github.io/German-Shepherd-Pet-Game/mystyle.css">
    <script src="https://377rzd.github.io/German-Shepherd-Pet-Game/script.js"></script>
</head>
<body>
    <nav>
        <t>The German Shepherd Pet Project</t>
        <label for="name">Name: </label>
        <form>
            <label for="name">Name: </label>
            <input type="text" id="name" name="name" oninput="localStorage.setItem('name', this.value); console.log('New Name is ' + this.value);">
        </form>
        <t>Male</t>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
        <t>Female</t>
    </nav>
    <img src="https://377rzd.github.io/German-Shepherd-Pet-Game/assets/dog-h-c-l.png">
    <br>
    <div class="buttons">
        <button>Feed</button>
        <button>Clean</button>
    </div>
    <div class="buttons">
        <button>Light</button>
        <button>Play</button>
    </div>
</body>
