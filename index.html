<head>
    <title>The Pet Project</title>
    <link rel="stylesheet" href="https://377rzd.github.io/German-Shepherd-Pet-Game/mystyle.css">
    <script src="https://377rzd.github.io/German-Shepherd-Pet-Game/script.js"></script>
</head>
<body>
    <nav>
        <t>The German Shepherd Pet Project    </t>
        <form>
            <label for="name">Name: </label>
            <input type="text" id="name" name="name" onload="this.value = localStorage.getItem('name');" oninput="localStorage.setItem('name', this.value); console.log('New Name is ' + this.value);">
        </form>
        <t>Male</t>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
        <t>Female</t>
    </nav>
    <img id="dog" src="">
    <br>
    <div class="buttons">
        <button onclick="hunger = 10; checkState();">Feed</button>
        <button onclick="dirty = 15; checkState();">Clean</button>
    </div>
    <div class="buttons">
        <button onclick="light = true; checkState();">Light</button>
        <button onclick="bored = 5; checkState();">Play</button>
    </div>
</body>
